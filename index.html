<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시작 페이지</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; color: white; font-family: sans-serif; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; background: #00ff88; font-weight: bold; }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <h1>문제 풀이 시스템</h1>
        <p>아래 버튼을 클릭하여 별도 창에서 시작하세요.</p>
        <button onclick="openSecureWindow()">문제 창 열기</button>
    </div>

    <script>
        function openSecureWindow() {
            // 새 창의 크기와 옵션 설정 (주소창, 상태표시줄 등을 최대한 숨김)
            const options = "width=600,height=500,left=200,top=200,menubar=no,toolbar=no,location=no,status=no,resizable=no";
            window.open("quiz.html", "SecureQuiz", options);
        }
    </script>
</body>
</html>
