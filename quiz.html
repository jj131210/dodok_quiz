<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>도덕 원리 검증 테스트</title>
    <style>
        body {
            background: #0f172a; color: #f8fafc;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; margin: 0;
            user-select: none; font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }
        .quiz-box {
            background: #1e293b; padding: 40px;
            border-radius: 20px; border: 1px solid #38bdf8;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 550px; text-align: center;
        }
        .progress { color: #38bdf8; font-size: 14px; margin-bottom: 10px; font-weight: bold; }
        .question { font-size: 17px; margin-bottom: 25px; line-height: 1.6; min-height: 80px; word-break: keep-all; }
        .options { text-align: left; display: flex; flex-direction: column; gap: 10px; }
        .option {
            background: #334155; padding: 14px;
            border-radius: 10px; font-size: 14px; border: 2px solid transparent;
            transition: all 0.2s;
        }
        .footer-info { font-size: 12px; color: #64748b; margin-top: 30px; }
        kbd {
            background: #f1f5f9; color: #0f172a; padding: 2px 8px;
            border-radius: 4px; font-size: 13px; font-weight: bold;
        }
    </style>
</head>
<body oncontextmenu="return false">

    <div class="quiz-box" id="quizBox">
        <div class="progress" id="progress">로딩 중...</div>
        <div class="question" id="question">문제를 구성 중입니다.</div>
        <div class="options" id="options"></div>
        <p class="footer-info">키보드 <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> <kbd>4</kbd> 로 선택하세요.</p>
    </div>

    <script>
        const allQuestions = [
            // 보편화 결과 검사 관련
            { q: "새치기를 하려 할 때, '모든 사람이 새치기를 한다면 사회가 마비될 것'이라고 생각하는 검사는?", a: ["역할 교환 검사", "보편화 결과 검사", "법률 우선 검사", "자기 중심 검사"], cor: 2 },
            { q: "무단 횡단을 정당화하기 전, '모두가 무단 횡단을 하면 교통 체계가 무너진다'는 결론은 어떤 원리인가?", a: ["공리주의 원리", "역할 교환", "보편화 결과", "상황적 판단"], cor: 3 },
            { q: "거짓말을 해도 된다고 생각하는 사람에게 '모두가 거짓말을 하면 신뢰가 사라진다'고 지적하는 것은?", a: ["보편화 결과 검사", "역할 교환 검사", "보상 원리", "황금률"], cor: 1 },
            { q: "공공 기물을 함부로 사용하는 행위를 보편화 결과 검사로 비판한다면 적절한 말은?", a: ["내가 기물이라면 슬플 거야", "남들도 다 하니까 괜찮아", "모두가 함부로 쓰면 아무도 쓸 수 없게 돼", "법으로 금지되어 있어"], cor: 3 },
            { q: "약속을 어기는 행위에 대해 '사회 구성원 모두가 약속을 어기는 상황'을 가정해보는 이유는?", a: ["벌금을 내기 위해", "행위의 보편적 타당성을 검토하기 위해", "친구가 화낼까 봐", "다수결을 따르기 위해"], cor: 2 },

            // 역할 교환 검사 관련 (역지사지)
            { q: "층간 소음을 내는 사람에게 '너도 아랫집 사람이 되어 괴로움을 느껴봐라'라고 하는 검사는?", a: ["결과 예측 검사", "역할 교환 검사", "보편화 검사", "처벌 회피 검사"], cor: 2 },
            { q: "역할 교환 검사의 핵심 정신과 가장 유사한 격언은?", a: ["눈에는 눈, 이에는 이", "기소불욕 물시어인 (내가 하기 싫은 것을 남에게 시키지 마라)", "아는 것이 힘이다", "시간은 금이다"], cor: 2 },
            { q: "괴롭힘을 주도하는 학생에게 피해 학생의 입장이 되어보게 하는 도덕 교육 방법은?", a: ["보편화 검사", "역할 교환 검사", "지능 검사", "성격 검사"], cor: 2 },
            { q: "역할 교환 검사를 수행할 때 가장 필요한 태도는 무엇인가?", a: ["냉철한 계산", "공감과 역지사지", "법적 지식", "자신의 이익 추구"], cor: 2 },
            { q: "물건을 훔친 사람에게 '네 물건을 도둑맞았을 때의 기분을 생각하라'고 묻는 원리는?", a: ["보편화 결과", "역할 교환", "인과 응보", "경제적 효율"], cor: 2 },

            // 비판적 사고 및 일반 도덕 딜레마
            { q: "사실과 의견을 구분하는 비판적 사고의 올바른 예는?", a: ["친구의 말을 무조건 믿는다", "내 기분에 따라 판단한다", "주장의 근거가 객관적인지 확인한다", "다수가 찬성하면 사실로 본다"], cor: 3 },
            { q: "편향된 정보를 접했을 때 취해야 할 도덕적 태도는?", a: ["내가 좋아하는 쪽만 믿는다", "다양한 관점의 정보를 비교 분석한다", "정보를 차단한다", "자극적인 부분을 공유한다"], cor: 2 },
            { q: "어떤 주장의 '전제'가 옳은지 검토하는 과정은 무엇인가?", a: ["창의적 사고", "감성적 사고", "비판적 사고", "직관적 사고"], cor: 3 },
            { q: "권위에 호소하는 오류를 방지하기 위해 필요한 자세는?", a: ["유명인의 말을 무조건 수용", "전문가의 의견이라도 논리적 근거를 검토함", "반대 의견 무시", "책에 나온 내용은 무조건 암기"], cor: 2 },
            { q: "환경 보호를 위해 '나 하나쯤이야'라는 생각을 버리게 하는 도덕 원리는?", a: ["보편화 결과 검사", "경제성 검사", "속도 검사", "인지 검사"], cor: 1 },
            { q: "타인의 권리를 존중하는 이유를 '역할 교환' 관점에서 설명하면?", a: ["법적으로 처벌받기 때문", "나도 타인에게 존중받고 싶기 때문", "칭찬받기 위해", "그냥 남들이 하니까"], cor: 2 },
            { q: "토론 시 상대방의 인격을 공격하는 것이 비판적 사고에 어긋나는 이유는?", a: ["상대의 기분이 나빠서", "주장의 논리와 관계없는 오류이기 때문", "목소리가 작아져서", "싸움이 나기 때문"], cor: 2 },
            { q: "가짜 뉴스가 사회에 미치는 영향을 '보편화' 관점에서 본다면?", a: ["개인의 자유다", "모두가 가짜 정보를 믿으면 진실이 무의미해진다", "돈이 되는 정보가 중요하다", "남들도 속으니 나도 속는다"], cor: 2 },
            { q: "어떤 행동이 도덕적인지 판단할 때 가장 먼저 고려해야 할 것은?", a: ["나의 이익", "타인에게 미칠 영향과 보편적 원리", "상대방의 외모", "주변의 시선"], cor: 2 },
            { q: "도덕적 딜레마 상황에서 비판적 사고를 사용하는 목적은?", a: ["상대방을 이기기 위해", "최선의 도덕적 해결책을 찾기 위해", "결정을 미루기 위해", "자신의 잘못을 숨기기 위해"], cor: 2 }
        ];

        // 섞고 10문제 선택
        const selectedQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 10);

        let currentIdx = 0;
        let score = 0;
        let isLocked = false;

        function renderQuiz() {
            if (currentIdx >= selectedQuestions.length) {
                showResult();
                return;
            }
            isLocked = false;
            const item = selectedQuestions[currentIdx];
            document.getElementById('progress').innerText = `문제 ${currentIdx + 1} / 10`;
            document.getElementById('question').innerText = `Q. ${item.q}`;
            
            let html = "";
            item.a.forEach((choice, i) => {
                html += `<div class="option" id="opt${i+1}">${i+1}. ${choice}</div>`;
            });
            document.getElementById('options').innerHTML = html;
        }

        function showResult() {
            const box = document.getElementById('quizBox');
            box.innerHTML = `
                <h2 style="color:#38bdf8">테스트 결과</h2>
                <p style="font-size:24px;"><strong>${score * 10}점 / 100점</strong></p>
                <p>${score >= 8 ? "당신은 도덕적 사고의 달인입니다!" : "조금 더 고민하는 태도가 필요합니다."}</p>
                <button onclick="window.close()" style="margin-top:20px; padding:12px 25px; border-radius:8px; border:none; background:#38bdf8; font-weight:bold; cursor:pointer;">종료</button>
            `;
        }

        window.addEventListener('keydown', function(e) {
            // 보안 차단
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) || (e.ctrlKey && e.keyCode === 85)) {
                e.preventDefault(); return;
            }

            if (!isLocked && ['1', '2', '3', '4'].includes(e.key)) {
                isLocked = true;
                const choiceNum = parseInt(e.key);
                const correctNum = selectedQuestions[currentIdx].cor;

                const selectedEl = document.getElementById(`opt${choiceNum}`);
                if (choiceNum === correctNum) {
                    score++;
                    selectedEl.style.background = "#1e40af";
                } else {
                    selectedEl.style.background = "#991b1b";
                }
                
                setTimeout(() => {
                    currentIdx++;
                    renderQuiz();
                }, 400);
            }
        });

        renderQuiz();
        setInterval(() => { debugger; }, 500);
    </script>
</body>
</html>
